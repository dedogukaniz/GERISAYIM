<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>20 Temmuz 2026 Video için Geri Sayım</title>
  <style>
    body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 50px;
    background: linear-gradient(135deg, #ff7e5f, #feb47b, #6a11cb, #2575fc);
    color: white;
  }
  h1 {
    margin-top: 20px;
    font-size: 2.5em;
  }
  #countdown {
    font-size: 2em;
    margin-top: 20px;
  }
  .frame-container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
  }
  .frame {
    border: 5px solid #fff;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    border-radius: 10px;
  }
  .frame img {
    max-width: 300px;
    height: auto;
    display: block;
    border-radius: 5px;
  }

  </style>
</head>
<body>
  <h1>20 Temmuz 2026 Video için Geri Sayım</h1>
  <h2>Hilal & Doğukan</h2>
  <div id="countdown"></div>

  <script>
    // Hedef tarih
    const targetDate = new Date("July 20, 2026 00:00:00").getTime();

    // Her saniye güncelle
    const timer = setInterval(function() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      // Gün, saat, dakika, saniye hesapla
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("countdown").innerHTML =
        days + " Gün " + hours + " Saat " + minutes + " Dakika " + seconds + " Saniye";

      // Tarih geçtiyse
      if (distance < 0) {
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "Tarih Geldi!";
      }
    }, 1000);
    
  </script>
   <h1>Fotoğraflar</h1>
  <div class="frame-container">
    <div class="frame">
      <img src="photo1.jpeg" alt="Birinci fotoğraf">
    </div>
    <div class="frame">
      <img src="photo2.jpeg" alt="İkinci fotoğraf">
    </div>
  </div>

</body>

</html>
